<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adopta y Deja tu Huella - Admin</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>🐾 Panel de Gestión - Adopta y Deja tu Huella</h1>
    </header>

    <main>
        <!-- SECCIÓN PROTECTORAS -->
        <section class="card">
            <h2>🏢 Protectoras</h2>
            <form id="formProtectora">
                <input type="text" id="p_nombre" placeholder="Nombre Protectora" required>
                <input type="text" id="p_ubicacion" placeholder="Ubicación">
                <button type="submit">Registrar Protectora</button>
            </form>
            <ul id="listaProtectoras" class="data-list"></ul>
        </section>

        <!-- SECCIÓN USUARIOS -->
        <section class="card">
            <h2>👤 Usuarios</h2>
            <form id="formUsuario">
                <input type="text" id="u_nombre" placeholder="Nombre completo" required>
                <input type="email" id="u_email" placeholder="Email" required>
                <select id="u_tipo">
                    <option value="Adoptante">Adoptante</option>
                    <option value="Admin">Administrador</option>
                </select>
                <button type="submit">Crear Usuario</button>
            </form>
            <ul id="listaUsuarios" class="data-list"></ul>
        </section>

        <!-- SECCIÓN ANIMALES -->
        <section class="card">
            <h2>🐕 Animales</h2>
            <form id="animalForm">
                <input type="text" id="nombre" placeholder="Nombre" required>
                <input type="text" id="especie" placeholder="Especie" required>
                <input type="number" id="edad" placeholder="Edad">
                <select id="selectProtectora">
                    <!-- Se llena dinámicamente -->
                </select>
                <button type="submit">Dar de alta</button>
            </form>
            <div class="controls">
                <button onclick="cargarTodo()">🔄 Refrescar Todo</button>
            </div>
            <ul id="listaAnimales" class="data-list"></ul>
        </section>
    </main>

    <script src="scripts.js"></script>
</body>
</html>
