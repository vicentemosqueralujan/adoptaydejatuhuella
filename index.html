<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard — Adopta y Deja tu Huella</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>

    <!-- ===== LOGIN OVERLAY ===== -->
    <div id="loginOverlay" class="login-overlay">
        <div class="login-card">
            <div class="login-header">
                <div class="icon-wrap">
                    <i class="fa-solid fa-paw"></i>
                </div>
                <h2>Panel de Control</h2>
                <p>Introduce tus credenciales de administrador</p>
            </div>
            <div class="login-body">
                <div class="input-group">
                    <input type="email" id="loginEmail" placeholder="Correo electrónico" autocomplete="off">
                </div>
                <div class="input-group">
                    <input type="password" id="loginPass" placeholder="Contraseña">
                </div>
                <button id="btnEntrar" class="btn-login">
                    Entrar al Panel
                </button>
            </div>
        </div>
    </div>

    <!-- ===== HEADER ===== -->
    <header>
        <div class="header-content">
            <h1>🐾 Adopta y Deja tu Huella</h1>
            <p>Panel Administrativo</p>
        </div>
        <button onclick="logout()" class="btn-logout" title="Cerrar sesión">
            <i class="fa-solid fa-right-from-bracket"></i>
        </button>
    </header>

    <!-- ===== DASHBOARD ===== -->
    <main class="dashboard-grid">

        <!-- PROTECTORAS -->
        <section class="card">
            <h2>🏢 Protectoras</h2>
            <form id="formProtectora" class="admin-form">
                <input type="text" id="p_nombre" placeholder="Nombre de la protectora" required>
                <input type="text" id="p_ubicacion" placeholder="Ubicación">
                <button type="submit" class="btn-add">
                    <i class="fa-solid fa-plus"></i> Registrar
                </button>
            </form>
            <ul id="listaProtectoras" class="data-list">
                <li class="empty-state"><i class="fa-solid fa-inbox"></i> Sin registros</li>
            </ul>
        </section>

        <!-- USUARIOS -->
        <section class="card">
            <h2>👤 Usuarios</h2>
            <form id="formUsuario" class="admin-form">
                <input type="text" id="u_nombre" placeholder="Nombre completo" required>
                <input type="email" id="u_email" placeholder="Correo electrónico" required>
                <select id="u_tipo">
                    <option value="Adoptante">Adoptante</option>
                    <option value="Admin">Admin</option>
                </select>
                <button type="submit" class="btn-add">
                    <i class="fa-solid fa-user-plus"></i> Crear usuario
                </button>
            </form>
            <ul id="listaUsuarios" class="data-list">
                <li class="empty-state"><i class="fa-solid fa-inbox"></i> Sin registros</li>
            </ul>
        </section>

        <!-- ANIMALES -->
        <section class="card">
            <h2>🐕 Animales</h2>
            <form id="animalForm" class="admin-form">
                <input type="text" id="nombre" placeholder="Nombre del animal" required>
                <input type="text" id="especie" placeholder="Especie (perro, gato…)" required>
                <input type="number" id="edad" placeholder="Edad (años)" min="0">
                <select id="selectProtectora" required>
                    <option value="">— Selecciona protectora —</option>
                </select>
                <button type="submit" class="btn-add">
                    <i class="fa-solid fa-paw"></i> Dar de alta
                </button>
            </form>
            <ul id="listaAnimales" class="data-list">
                <li class="empty-state"><i class="fa-solid fa-inbox"></i> Sin registros</li>
            </ul>
        </section>

    </main>

    <script src="scripts.js"></script>
</body>
</html>
